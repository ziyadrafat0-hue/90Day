<title>متتبع العادات — 90 يوم</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0f0f1a; --surface:#1a1a2e; --surface2:#22223b; --surface3:#2d2d4a;
  --accent:#7c6af7; --accent-soft:rgba(124,106,247,0.15);
  --green:#22c55e; --green-soft:rgba(34,197,94,0.13);
  --amber:#f59e0b; --amber-soft:rgba(245,158,11,0.15);
  --red:#ef4444; --red-soft:rgba(239,68,68,0.13);
  --text:#f0f0f8; --text2:#a0a0c0; --text3:#60607a;
  --border:rgba(255,255,255,0.07); --border2:rgba(255,255,255,0.13);
  --radius:12px; --radius-sm:8px;
}
.light {
  --bg:#f5f5f7; --surface:#ffffff; --surface2:#f0f0f5; --surface3:#e5e5ea;
  --accent:#5b4fe0; --accent-soft:rgba(91,79,224,0.1);
  --green:#16a34a; --green-soft:rgba(22,163,74,0.1);
  --amber:#d97706; --amber-soft:rgba(217,119,6,0.1);
  --red:#dc2626; --red-soft:rgba(220,38,38,0.1);
  --text:#111118; --text2:#444455; --text3:#888899;
  --border:rgba(0,0,0,0.08); --border2:rgba(0,0,0,0.15);
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{max-width:100%;overflow-x:hidden;touch-action:pan-y;}
body{font-family:'Cairo',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:80px;transition:background 0.25s,color 0.2s;}
.app-header{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 20px 12px;position:sticky;top:0;z-index:100;}
.header-row{display:flex;justify-content:space-between;align-items:center;}
.app-title{font-size:18px;font-weight:700;color:var(--text);}
.app-subtitle{font-size:12px;color:var(--text3);margin-top:2px;}
.header-btns{display:flex;gap:8px;align-items:center;}
.theme-btn{background:var(--surface2);border:1px solid var(--border2);border-radius:20px;padding:5px 12px;font-size:13px;cursor:pointer;color:var(--text2);font-family:'Cairo',sans-serif;}
.sync-badge{font-size:11px;padding:3px 10px;border-radius:20px;font-weight:600;}
.sync-ok{background:rgba(34,197,94,0.15);color:var(--green);}
.sync-ing{background:var(--accent-soft);color:var(--accent);}
.sync-err{background:rgba(239,68,68,0.15);color:var(--red);}
.stats-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:14px 16px;background:var(--surface);border-bottom:1px solid var(--border);}
.stat{text-align:center;}
.stat-num{font-size:20px;font-weight:700;color:var(--accent);}
.stat-label{font-size:10px;color:var(--text3);margin-top:1px;}
.tabs{display:flex;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:74px;z-index:99;overflow-x:auto;}
.tab{flex:1;min-width:70px;padding:12px 4px;text-align:center;font-size:12px;font-weight:500;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;background:none;border-top:none;border-left:none;border-right:none;font-family:'Cairo',sans-serif;white-space:nowrap;}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);}
.content{padding:14px 16px;max-width:600px;margin:0 auto;}
.day-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:12px;}
.day-card.is-today{border-color:var(--accent);border-width:1.5px;}
.day-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;}
.day-num{font-size:12px;color:var(--text3);margin-bottom:2px;}
.day-name{font-size:15px;font-weight:600;color:var(--text);}
.day-pct{font-size:20px;font-weight:700;color:var(--accent);}
.today-badge{display:inline-block;background:var(--accent-soft);color:var(--accent);font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;margin-right:6px;vertical-align:middle;}
.section-label{font-size:11px;font-weight:600;color:var(--text3);margin:10px 0 6px;display:flex;align-items:center;gap:6px;}
.prayer-section-pct{font-size:11px;background:var(--accent-soft);color:var(--accent);padding:2px 8px;border-radius:20px;margin-right:auto;}
.prayer-row{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:var(--radius-sm);background:var(--surface2);margin-bottom:5px;}
.prayer-icon{font-size:16px;flex-shrink:0;}
.prayer-name{font-size:13px;font-weight:600;color:var(--text2);flex:1;}
.prayer-btns{display:flex;gap:5px;flex-shrink:0;}
.p-btn{font-size:11px;font-weight:600;font-family:'Cairo',sans-serif;padding:4px 10px;border-radius:20px;border:1.5px solid var(--border2);background:transparent;color:var(--text3);cursor:pointer;white-space:nowrap;-webkit-tap-highlight-color:transparent;}
.p-btn:active{transform:scale(0.95);}
.p-btn.mosque.selected{background:var(--accent-soft);border-color:var(--accent);color:var(--accent);}
.p-btn.home.selected{background:var(--amber-soft);border-color:var(--amber);color:var(--amber);}
.habits-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px;}
.habit{display:flex;align-items:center;gap:5px;padding:6px 7px;border-radius:var(--radius-sm);background:var(--surface2);cursor:pointer;border:1px solid transparent;-webkit-tap-highlight-color:transparent;}
.habit:active{transform:scale(0.97);}
.habit.done{background:var(--green-soft);border-color:rgba(34,197,94,0.25);}
.habit.is-number{cursor:default;}
.habit-icon{font-size:13px;flex-shrink:0;}
.habit-name{font-size:10px;font-weight:500;color:var(--text2);flex:1;line-height:1.3;}
.habit.done .habit-name{color:var(--green);}
.check-circle{width:15px;height:15px;border-radius:50%;border:1.5px solid var(--border2);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:9px;color:transparent;}
.habit.done .check-circle{background:var(--green);border-color:var(--green);color:#fff;}
.num-input{width:46px;background:var(--surface3);border:1px solid var(--border2);border-radius:6px;color:var(--accent);font-size:11px;font-weight:600;font-family:'Cairo',sans-serif;padding:2px 4px;text-align:center;outline:none;flex-shrink:0;}
.num-input:focus{border-color:var(--accent);}
.num-unit{font-size:9px;color:var(--text3);flex-shrink:0;}
.prog-bar{height:3px;background:var(--surface3);border-radius:2px;margin-top:12px;}
.prog-fill{height:100%;border-radius:2px;background:var(--green);transition:width 0.3s;}

/* Exercise tab */
.exercise-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:12px;}
.exercise-header{font-size:15px;font-weight:700;color:var(--text);margin-bottom:4px;}
.exercise-sub{font-size:12px;color:var(--text3);margin-bottom:12px;}
.exercise-day-row{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:var(--radius-sm);background:var(--surface2);margin-bottom:6px;}
.exercise-day-label{font-size:13px;font-weight:600;color:var(--text2);flex:1;}
.exercise-tag{font-size:10px;padding:2px 8px;border-radius:20px;font-weight:600;}
.tag-rest{background:var(--surface3);color:var(--text3);}
.tag-workout{background:var(--accent-soft);color:var(--accent);}
.ex-check-btn{font-size:18px;cursor:pointer;-webkit-tap-highlight-color:transparent;background:none;border:none;}
.exercise-moves{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:8px;}
.exercise-move{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:var(--radius-sm);background:var(--surface3);}
.move-name{font-size:12px;font-weight:500;color:var(--text2);flex:1;}
.move-sets{font-size:11px;color:var(--text3);}
.sets-done{color:var(--green);font-weight:600;}

/* NoP tab */
.nop-streak-box{background:var(--surface);border:1.5px solid var(--accent);border-radius:var(--radius);padding:20px;text-align:center;margin-bottom:16px;}
.nop-streak-num{font-size:48px;font-weight:700;color:var(--accent);}
.nop-streak-label{font-size:14px;color:var(--text3);margin-top:4px;}
.nop-grid{display:grid;grid-template-columns:repeat(9,1fr);gap:4px;margin-bottom:12px;}
.nop-dot{aspect-ratio:1;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:600;cursor:pointer;border:1px solid transparent;-webkit-tap-highlight-color:transparent;}
.nop-dot.nd-ok{background:var(--green-soft);border-color:rgba(34,197,94,0.3);color:var(--green);}
.nop-dot.nd-fail{background:var(--red-soft);border-color:rgba(239,68,68,0.3);color:var(--red);}
.nop-dot.nd-empty{background:var(--surface2);color:var(--text3);}
.nop-dot.nd-today{border-color:var(--accent)!important;}
.nop-legend{display:flex;gap:12px;flex-wrap:wrap;font-size:11px;color:var(--text3);}
.nop-leg-item{display:flex;align-items:center;gap:5px;}
.nop-leg-dot{width:12px;height:12px;border-radius:3px;}

/* Weight tab */
.weight-header{font-size:15px;font-weight:700;color:var(--text);margin-bottom:4px;}
.weight-sub{font-size:12px;color:var(--text3);margin-bottom:14px;}
.weight-entries{display:flex;flex-direction:column;gap:8px;margin-bottom:16px;}
.weight-entry{background:var(--surface2);border-radius:var(--radius-sm);padding:12px 14px;display:flex;align-items:center;gap:10px;}
.weight-day-label{font-size:13px;font-weight:600;color:var(--text2);flex:1;}
.weight-val{font-size:16px;font-weight:700;color:var(--accent);margin-left:auto;}
.weight-input-row{display:flex;gap:8px;align-items:center;margin-top:4px;}
.weight-input{background:var(--surface3);border:1px solid var(--border2);border-radius:8px;color:var(--accent);font-size:14px;font-weight:600;font-family:'Cairo',sans-serif;padding:6px 10px;text-align:center;outline:none;width:90px;}
.weight-input:focus{border-color:var(--accent);}
.weight-save-btn{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:7px 16px;font-size:13px;font-weight:600;font-family:'Cairo',sans-serif;cursor:pointer;}

/* Learn tab */
.learn-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:12px;}
.learn-title{font-size:15px;font-weight:700;color:var(--text);margin-bottom:4px;}
.learn-sub{font-size:12px;color:var(--text3);margin-bottom:12px;}
.learn-items{display:flex;flex-direction:column;gap:6px;}
.learn-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--radius-sm);background:var(--surface2);cursor:pointer;border:1px solid transparent;-webkit-tap-highlight-color:transparent;}
.learn-item:active{transform:scale(0.98);}
.learn-item.done{background:var(--green-soft);border-color:rgba(34,197,94,0.25);}
.learn-check{width:20px;height:20px;border-radius:50%;border:1.5px solid var(--border2);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:11px;color:transparent;}
.learn-item.done .learn-check{background:var(--green);border-color:var(--green);color:#fff;}
.learn-name{font-size:13px;font-weight:500;color:var(--text2);flex:1;}
.learn-item.done .learn-name{color:var(--green);}
.learn-custom-input{background:var(--surface3);border:1px solid var(--border2);border-radius:6px;color:var(--text);font-size:13px;font-family:'Cairo',sans-serif;padding:6px 10px;outline:none;width:100%;margin-top:8px;}
.learn-custom-input:focus{border-color:var(--accent);}
.learn-status{font-size:12px;padding:6px 10px;border-radius:var(--radius-sm);text-align:center;margin-top:8px;}
.learn-status.ok{background:var(--green-soft);color:var(--green);}
.learn-status.pending{background:var(--surface2);color:var(--text3);}

/* Overview */
.overview-grid{display:grid;grid-template-columns:repeat(9,1fr);gap:4px;margin-bottom:16px;}
.dot{aspect-ratio:1;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:600;cursor:pointer;border:1px solid transparent;}
.dot.today-dot{border-color:var(--accent)!important;}
.legend{display:flex;gap:10px;flex-wrap:wrap;margin-top:8px;}
.legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text3);}
.legend-dot{width:12px;height:12px;border-radius:3px;}
.ov-title{font-size:13px;font-weight:600;color:var(--text3);margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border);}

.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);display:flex;padding:8px 0 calc(8px + env(safe-area-inset-bottom));z-index:200;}
.bnav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:4px 0;-webkit-tap-highlight-color:transparent;}
.bnav-icon{font-size:20px;color:var(--text3);}
.bnav-label{font-size:9px;color:var(--text3);font-family:'Cairo',sans-serif;}
.bnav-item.active .bnav-icon,.bnav-item.active .bnav-label{color:var(--accent);}
@media(min-width:520px){.habits-grid,.exercise-moves{grid-template-columns:1fr 1fr 1fr;}.nop-grid,.overview-grid{grid-template-columns:repeat(10,1fr);}}
</style>
</head>
<body>
<div class="app-header">
  <div class="header-row">
    <div class="app-title">متتبع العادات ⚡</div>
    <div class="header-btns">
      <button class="theme-btn" onclick="toggleTheme()" id="theme-btn">☀️ فاتح</button>
      <div class="sync-badge sync-ing" id="sync-badge">جاري التحميل...</div>
    </div>
  </div>
  <div class="app-subtitle" id="date-range">90 يوم لبناء نسختك الأفضل</div>
</div>
<div class="stats-bar">
  <div class="stat"><div class="stat-num" id="s-streak">0</div><div class="stat-label">🔥 متتالي</div></div>
  <div class="stat"><div class="stat-num" id="s-today">0%</div><div class="stat-label">اليوم</div></div>
  <div class="stat"><div class="stat-num" id="s-total">0%</div><div class="stat-label">الإجمالي</div></div>
  <div class="stat"><div class="stat-num" id="s-complete">0</div><div class="stat-label">أيام مكتملة</div></div>
</div>
<div class="tabs">
  <button class="tab active" onclick="switchTab('today')" id="tab-btn-today">اليوم</button>
  <button class="tab" onclick="switchTab('nop')" id="tab-btn-nop">🛡️ الإباحية</button>
  <button class="tab" onclick="switchTab('exercise')" id="tab-btn-exercise">💪 الرياضة</button>
  <button class="tab" onclick="switchTab('learn')" id="tab-btn-learn">📚 التعلم</button>
  <button class="tab" onclick="switchTab('weight')" id="tab-btn-weight">⚖️ الوزن</button>
  <button class="tab" onclick="switchTab('overview')" id="tab-btn-overview">🗺️ الخريطة</button>
</div>
<div class="content">
  <div id="pane-today"></div>
  <div id="pane-nop" style="display:none"></div>
  <div id="pane-exercise" style="display:none"></div>
  <div id="pane-learn" style="display:none"></div>
  <div id="pane-weight" style="display:none"></div>
  <div id="pane-overview" style="display:none"></div>
</div>
<div class="bottom-nav">
  <div class="bnav-item active" onclick="switchTab('today')" id="bnav-today"><div class="bnav-icon">☀️</div><div class="bnav-label">اليوم</div></div>
  <div class="bnav-item" onclick="switchTab('nop')" id="bnav-nop"><div class="bnav-icon">🛡️</div><div class="bnav-label">الإباحية</div></div>
  <div class="bnav-item" onclick="switchTab('exercise')" id="bnav-exercise"><div class="bnav-icon">💪</div><div class="bnav-label">الرياضة</div></div>
  <div class="bnav-item" onclick="switchTab('learn')" id="bnav-learn"><div class="bnav-icon">📚</div><div class="bnav-label">التعلم</div></div>
  <div class="bnav-item" onclick="switchTab('overview')" id="bnav-overview"><div class="bnav-icon">🗺️</div><div class="bnav-label">الخريطة</div></div>
</div>
<script>
const SUPABASE_URL='https://chcywjnqxmuvyakqytve.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNoY3l3am5xeG11dnlha3F5dHZlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI2MzEzNjksImV4cCI6MjA5ODIwNzM2OX0.32yXE4bpPn-ZTaZUP4RXcNAuv4_zuk___95x9X9yejw';
const TABLE='habits';

let USER_ID=localStorage.getItem('habit90_user_id');
if(!USER_ID){USER_ID='user_'+Math.random().toString(36).substr(2,9);localStorage.setItem('habit90_user_id',USER_ID);}

const PRAYERS=[
  {id:'fajr',name:'الفجر',icon:'🌙'},
  {id:'dhuhr',name:'الظهر',icon:'🌤'},
  {id:'asr',name:'العصر',icon:'☀️'},
  {id:'maghrib',name:'المغرب',icon:'🌅'},
  {id:'isha',name:'العشاء',icon:'🌃'},
];
const HABITS=[
  {id:'witr',name:'ركعة وتر',type:'check',icon:'⭐'},
  {id:'shower',name:'دش بارد',type:'check',icon:'🚿'},
  {id:'quran',name:'ورد قرآن',type:'check',icon:'📖'},
  {id:'study',name:'المذاكرة',type:'check',icon:'✏️'},
  {id:'calories',name:'السعرات',type:'number',icon:'🔥',placeholder:'أدخل',unit:'سعرة'},
  {id:'sleep',name:'النوم',type:'number',icon:'💤',placeholder:'أدخل',unit:'ساعة'},
];
const EXERCISES=[
  {id:'pushup',name:'ضغط',sets:'3×10'},
  {id:'squat',name:'سكوات',sets:'3×10'},
  {id:'chair',name:'كرسي',sets:'3×30ث'},
  {id:'abs',name:'البطن',sets:'3×10'},
  {id:'plank',name:'بلانك',sets:'3×30ث'},
  {id:'bridge',name:'الجسر الخلفي',sets:'3×10'},
];
const LEARN_ITEMS=[
  {id:'chess',name:'الشطرنج'},
  {id:'reading',name:'القراءة'},
  {id:'writing',name:'الكتابة'},
  {id:'coding',name:'البرمجة'},
];

let START_DATE=null,data={},activeTab='today',syncTimer=null;

// Theme
let isLight=localStorage.getItem('habit90_theme')==='light';
function applyTheme(){document.body.classList.toggle('light',isLight);document.getElementById('theme-btn').textContent=isLight?'🌙 داكن':'☀️ فاتح';}
function toggleTheme(){isLight=!isLight;localStorage.setItem('habit90_theme',isLight?'light':'dark');applyTheme();}
applyTheme();

// Sync
function setSyncBadge(s){
  const b=document.getElementById('sync-badge');
  const m={ok:['sync-ok','✓ متزامن'],ing:['sync-ing','جاري الحفظ...'],err:['sync-err','خطأ في الاتصال'],load:['sync-ing','جاري التحميل...']};
  b.className='sync-badge '+m[s][0];b.textContent=m[s][1];
}
async function sbFetch(path,options={}){
  const res=await fetch(SUPABASE_URL+'/rest/v1/'+path,{
    ...options,
    headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Content-Type':'application/json','Prefer':'resolution=merge-duplicates',...(options.headers||{})}
  });
  if(!res.ok)throw new Error(await res.text());
  const t=await res.text();return t?JSON.parse(t):null;
}
async function loadFromCloud(){
  setSyncBadge('load');
  try{
    const rows=await sbFetch(`${TABLE}?user_id=eq.${USER_ID}&select=day_index,habit_id,value`);
    data={};
    rows.forEach(r=>{
      const v=r.value;
      data[`d${r.day_index}_${r.habit_id}`]=v==='true'?true:v==='false'?false:v==='null'||v===''?null:v;
    });
    setSyncBadge('ok');
  }catch(e){
    setSyncBadge('err');
    const s=localStorage.getItem('habit90_local');if(s)data=JSON.parse(s);
  }
}
async function saveKey(dayIdx,habitId,value){
  setSyncBadge('ing');
  // حفظ محلي فوري
  data[`d${dayIdx}_${habitId}`]=value;
  localStorage.setItem('habit90_local',JSON.stringify(data));
  clearTimeout(syncTimer);
  syncTimer=setTimeout(async()=>{
    try{
      // تحديد إذا القيمة فاضية (يعني حذف)
      const isEmpty=value===null||value===undefined||value===false||value===''||value==='null';
      const strVal=isEmpty?null:String(value);
      // استخدام الـ RPC function اللي بتحذف لو القيمة فاضية
      await sbFetch('rpc/upsert_habit',{
        method:'POST',
        body:JSON.stringify({
          p_user_id:USER_ID,
          p_day_index:dayIdx,
          p_habit_id:habitId,
          p_value:strVal
        })
      });
      setSyncBadge('ok');
    }catch(e){
      console.error('Sync error:',e);
      setSyncBadge('err');
    }
  },500);
}

function todayIdx(){const t=new Date();t.setHours(0,0,0,0);return Math.max(0,Math.min(89,Math.floor((t-START_DATE)/86400000)));}
function getDayDate(i){const d=new Date(START_DATE);d.setDate(d.getDate()+i);return d;}

// Prayer score: mosque=20%, home=10%, none=0
function prayerScore(i){
  let pts=0;
  PRAYERS.forEach(p=>{const v=data[`d${i}_${p.id}`];if(v==='mosque')pts+=20;else if(v==='home')pts+=10;});
  return Math.min(100,pts); // max 100%
}
function prayerCount(i){let c=0;PRAYERS.forEach(p=>{if(data[`d${i}_${p.id}`])c++;});return c;}

// Overall day completion
function comp(i){
  let done=0,total=0;
  // Prayers: count as 1 unit each if set
  PRAYERS.forEach(p=>{total++;const v=data[`d${i}_${p.id}`];if(v==='mosque'||v==='home')done++;});
  // Habits
  HABITS.forEach(h=>{total++;const v=data[`d${i}_${h.id}`];if(h.type==='check'&&v===true)done++;else if(h.type==='number'&&v!==undefined&&v!==null&&v!=='')done++;});
  // Learn (1 unit if any learn done)
  total++;
  const learnDone=LEARN_ITEMS.some(l=>data[`d${i}_learn_${l.id}`]===true)||data[`d${i}_learn_custom_done`]===true;
  if(learnDone)done++;
  // Exercise (1 unit on workout days)
  const isWorkout=i%2===0;
  if(isWorkout){total++;if(data[`d${i}_ex_done`]===true)done++;}
  // NoP
  total++;if(data[`d${i}_nop`]===true)done++;
  return{done,total,pct:Math.round(done/total*100)};
}

function dotColor(pct){
  if(pct===0)return['rgba(0,0,0,0.06)','#aaa'];
  if(pct<40)return['rgba(239,68,68,0.18)','#ef4444'];
  if(pct<70)return['rgba(245,158,11,0.18)','#f59e0b'];
  if(pct<100)return['rgba(34,197,94,0.18)','#22c55e'];
  return['rgba(124,106,247,0.25)','#7c6af7'];
}

// ============ TODAY TAB ============
function renderToday(){
  const i=todayIdx();
  const{done,total,pct}=comp(i);
  const d=getDayDate(i);
  const dayName=d.toLocaleDateString('ar-EG',{weekday:'long',month:'long',day:'numeric'});
  const pScore=prayerScore(i);

  let prayersHtml=PRAYERS.map(p=>{
    const val=data[`d${i}_${p.id}`]||null;
    return`<div class="prayer-row">
      <span class="prayer-icon">${p.icon}</span>
      <span class="prayer-name">${p.name}</span>
      <div class="prayer-btns">
        <button class="p-btn mosque${val==='mosque'?' selected':''}" onclick="setPrayer(${i},'${p.id}','mosque')">🕌 جامع</button>
        <button class="p-btn home${val==='home'?' selected':''}" onclick="setPrayer(${i},'${p.id}','home')">🏠 بيت</button>
      </div>
    </div>`;
  }).join('');

  let habitsHtml=HABITS.map(h=>{
    const key=`d${i}_${h.id}`;const val=data[key];
    if(h.type==='check'){
      const done=val===true;
      return`<div class="habit${done?' done':''}" onclick="toggleHabit(${i},'${h.id}')">
        <span class="habit-icon">${h.icon}</span><span class="habit-name">${h.name}</span>
        <div class="check-circle">${done?'✓':''}</div></div>`;
    }
    return`<div class="habit is-number">
      <span class="habit-icon">${h.icon}</span><span class="habit-name">${h.name}</span>
      <input class="num-input" type="number" min="0" placeholder="${h.placeholder}" value="${val||''}"
        onchange="setNum(${i},'${h.id}',this.value)" onclick="event.stopPropagation()">
      <span class="num-unit">${h.unit}</span></div>`;
  }).join('');

  document.getElementById('pane-today').innerHTML=`
    <div class="day-card is-today">
      <div class="day-header">
        <div><div class="day-num">يوم ${i+1} <span class="today-badge">اليوم</span></div>
        <div class="day-name">${dayName}</div></div>
        <div class="day-pct">${pct}%</div>
      </div>
      <div class="section-label">🕌 الصلوات <span class="prayer-section-pct">${pScore}%</span></div>
      ${prayersHtml}
      <div class="section-label" style="margin-top:12px">✅ العادات</div>
      <div class="habits-grid">${habitsHtml}</div>
      <div class="prog-bar"><div class="prog-fill" style="width:${pct}%"></div></div>
    </div>`;
}

async function setPrayer(i,id,val){
  const key=`d${i}_${id}`;
  const cur=data[key]||null;
  const newVal=cur===val?null:val;
  data[key]=newVal;
  renderToday();updateStats();
  await saveKey(i,id,newVal);
}
async function toggleHabit(i,id){
  const key=`d${i}_${id}`;
  data[key]=data[key]===true?false:true;
  renderToday();updateStats();
  await saveKey(i,id,data[key]);
}
async function setNum(i,id,val){
  data[`d${i}_${id}`]=val;
  updateStats();
  await saveKey(i,id,val);
}

// ============ NOP TAB ============
function renderNop(){
  const ti=todayIdx();
  // حساب السترك
  let streak=0;
  for(let i=ti;i>=0;i--){if(data[`d${i}_nop`]===true)streak++;else break;}

  let gridHtml='';
  for(let i=0;i<90;i++){
    const v=data[`d${i}_nop`];
    const isT=i===ti;
    let cls='nop-dot';
    if(v===true)cls+=' nd-ok';else if(v===false)cls+=' nd-fail';else cls+=' nd-empty';
    if(isT)cls+=' nd-today';
    gridHtml+=`<div class="${cls}" onclick="toggleNop(${i})" title="يوم ${i+1}">${i+1}</div>`;
  }

  document.getElementById('pane-nop').innerHTML=`
    <div class="nop-streak-box">
      <div class="nop-streak-num">${streak}</div>
      <div class="nop-streak-label">يوم متتالي بدون إباحية 🛡️</div>
    </div>
    <div class="ov-title">سجل الـ 90 يوم</div>
    <div class="nop-grid">${gridHtml}</div>
    <div class="nop-legend">
      <div class="nop-leg-item"><div class="nop-leg-dot" style="background:var(--green-soft);border:1px solid rgba(34,197,94,0.3)"></div>نجح ✓</div>
      <div class="nop-leg-item"><div class="nop-leg-dot" style="background:var(--red-soft);border:1px solid rgba(239,68,68,0.3)"></div>فشل ✗</div>
      <div class="nop-leg-item"><div class="nop-leg-dot" style="background:var(--surface2)"></div>لم يسجل</div>
    </div>`;
}
async function toggleNop(i){
  const key=`d${i}_nop`;
  const cur=data[key];
  // cycle: null → true → false → null
  if(cur===undefined||cur===null)data[key]=true;
  else if(cur===true)data[key]=false;
  else data[key]=null;
  renderNop();updateStats();
  await saveKey(i,'nop',data[key]);
}

// ============ EXERCISE TAB ============
function renderExercise(){
  const ti=todayIdx();
  let html='';
  // show today + nearby days
  const start=Math.max(0,ti-2),end=Math.min(89,ti+5);
  for(let i=start;i<=end;i++){
    const isWorkout=i%2===0;
    const isToday=i===ti;
    const d=getDayDate(i);
    const label=d.toLocaleDateString('ar-EG',{weekday:'short',month:'short',day:'numeric'});
    const exDone=data[`d${i}_ex_done`]===true;

    let innerHtml=`<div class="exercise-day-row">
      <span class="exercise-day-label">يوم ${i+1}${isToday?' 📍':''} — ${label}</span>
      <span class="exercise-tag ${isWorkout?'tag-workout':'tag-rest'}">${isWorkout?'💪 تمرين':'😴 راحة'}</span>
      ${isWorkout?`<button class="ex-check-btn" onclick="toggleExDone(${i})">${exDone?'✅':'⬜'}</button>`:''}
    </div>`;

    if(isWorkout){
      const movesHtml=EXERCISES.map(ex=>{
        const key=`d${i}_ex_${ex.id}`;
        const done=data[key]===true;
        return`<div class="exercise-move" style="${done?'background:var(--green-soft);':''}">
          <span style="font-size:14px">${done?'✅':'⬜'}</span>
          <span class="move-name" style="${done?'color:var(--green)':''}">${ex.name}</span>
          <span class="move-sets ${done?'sets-done':''}">${ex.sets}</span>
        </div>`;
      }).join('');
      innerHtml+=`<div class="exercise-moves" style="margin-top:8px">${movesHtml}</div>
        <div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:8px">
          ${EXERCISES.map(ex=>`<button onclick="toggleExMove(${i},'${ex.id}')" style="font-size:11px;padding:4px 10px;border-radius:20px;border:1px solid var(--border2);background:${data[`d${i}_ex_${ex.id}`]===true?'var(--green-soft)':'var(--surface2)'};color:${data[`d${i}_ex_${ex.id}`]===true?'var(--green)':'var(--text3)'};cursor:pointer;font-family:Cairo,sans-serif">${ex.name}</button>`).join('')}
        </div>`;
    }

    html+=`<div class="exercise-card">${innerHtml}</div>`;
  }
  document.getElementById('pane-exercise').innerHTML=`
    <div style="font-size:15px;font-weight:700;color:var(--text);margin-bottom:4px">💪 جدول الرياضة</div>
    <div style="font-size:12px;color:var(--text3);margin-bottom:14px">يوم تمرين، يوم راحة — التمارين: ضغط، سكوات، كرسي، بطن، بلانك، جسر خلفي</div>
    ${html}`;
}
async function toggleExMove(i,exId){
  const key=`d${i}_ex_${exId}`;
  data[key]=data[key]===true?false:true;
  // لو كل التمارين اتعملت، اعتبر اليوم مكتمل
  const allDone=EXERCISES.every(ex=>data[`d${i}_ex_${ex.id}`]===true);
  data[`d${i}_ex_done`]=allDone;
  renderExercise();updateStats();
  await saveKey(i,`ex_${exId}`,data[key]);
  if(allDone)await saveKey(i,'ex_done',true);
}
async function toggleExDone(i){
  const cur=data[`d${i}_ex_done`]===true;
  data[`d${i}_ex_done`]=!cur;
  // toggle all moves
  EXERCISES.forEach(ex=>{data[`d${i}_ex_${ex.id}`]=!cur;});
  renderExercise();updateStats();
  await saveKey(i,'ex_done',!cur);
  for(const ex of EXERCISES)await saveKey(i,`ex_${ex.id}`,!cur);
}

// ============ LEARN TAB ============
function renderLearn(){
  const i=todayIdx();
  const items=LEARN_ITEMS.map(l=>{
    const done=data[`d${i}_learn_${l.id}`]===true;
    return`<div class="learn-item${done?' done':''}" onclick="toggleLearn(${i},'${l.id}')">
      <div class="learn-check">${done?'✓':''}</div>
      <span class="learn-name">${l.name}</span>
    </div>`;
  }).join('');

  const customDone=data[`d${i}_learn_custom_done`]===true;
  const customText=data[`d${i}_learn_custom_text`]||'';
  const anyDone=LEARN_ITEMS.some(l=>data[`d${i}_learn_${l.id}`]===true)||customDone;

  document.getElementById('pane-learn').innerHTML=`
    <div class="learn-card">
      <div class="learn-title">📚 التعلم اليومي</div>
      <div class="learn-sub">اختر واحدة أو أكثر — لو واحدة صح، التعلم يُحسب ✓</div>
      <div class="learn-items">
        ${items}
        <div class="learn-item${customDone?' done':''}" onclick="toggleLearnCustom(${i})" style="flex-direction:column;align-items:flex-start;gap:6px;cursor:pointer">
          <div style="display:flex;align-items:center;gap:10px;width:100%">
            <div class="learn-check">${customDone?'✓':''}</div>
            <span class="learn-name">أخرى...</span>
          </div>
          <input class="learn-custom-input" type="text" placeholder="اكتب ماذا تعلمت..." 
            value="${customText}"
            onclick="event.stopPropagation()"
            oninput="saveLearnCustomText(${i},this.value)"
            style="display:${customText||customDone?'block':'none'}">
        </div>
      </div>
      <div class="learn-status ${anyDone?'ok':'pending'}" style="margin-top:10px">
        ${anyDone?'✅ تعلمت اليوم!':'⏳ لم تسجل تعلماً بعد'}
      </div>
    </div>`;
}
async function toggleLearn(i,lid){
  const key=`d${i}_learn_${lid}`;
  data[key]=data[key]===true?false:true;
  renderLearn();updateStats();
  await saveKey(i,`learn_${lid}`,data[key]);
}
async function toggleLearnCustom(i){
  const key=`d${i}_learn_custom_done`;
  data[key]=data[key]===true?false:true;
  renderLearn();updateStats();
  await saveKey(i,'learn_custom_done',data[key]);
}
async function saveLearnCustomText(i,val){
  data[`d${i}_learn_custom_text`]=val;
  await saveKey(i,'learn_custom_text',val);
}

// ============ WEIGHT TAB ============
function renderWeight(){
  const checkpoints=[0,14,29,44,59,74,89];
  const ti=todayIdx();
  let entriesHtml=checkpoints.map(idx=>{
    const d=getDayDate(idx);
    const label=d.toLocaleDateString('ar-EG',{month:'short',day:'numeric'});
    const val=data[`weight_${idx}`];
    const isNow=ti>=idx&&ti<idx+15;
    return`<div class="weight-entry" style="${isNow?'border:1px solid var(--accent);':''}">
      <div>
        <div class="weight-day-label">يوم ${idx+1} — ${label}${idx===0?' (البداية)':''}</div>
        ${val?`<div style="font-size:12px;color:var(--text3)">تم التسجيل</div>`:`<div style="font-size:12px;color:var(--text3)">${isNow?'⏰ وقت التسجيل':'لم يحن الوقت'}</div>`}
      </div>
      <div style="display:flex;align-items:center;gap:8px;margin-right:auto">
        ${val?`<div class="weight-val">${val} kg</div>`:''}
        ${isNow?`<input class="weight-input" type="number" step="0.1" placeholder="${val||'الوزن'}" value="${val||''}"
          onchange="saveWeight(${idx},this.value)"> <span style="font-size:12px;color:var(--text3)">kg</span>`:''}
      </div>
    </div>`;
  }).join('');

  // حساب الفرق
  const first=data['weight_0'],last=checkpoints.reverse().map(i=>data[`weight_${i}`]).find(v=>v);
  checkpoints.reverse();
  const diff=first&&last?((parseFloat(last)-parseFloat(first)).toFixed(1)):null;

  document.getElementById('pane-weight').innerHTML=`
    <div style="font-size:15px;font-weight:700;color:var(--text);margin-bottom:4px">⚖️ متابعة الوزن</div>
    <div style="font-size:12px;color:var(--text3);margin-bottom:14px">كل 15 يوم — ${checkpoints.length} قياسات خلال 90 يوم</div>
    ${diff!==null?`<div style="background:${parseFloat(diff)<0?'var(--green-soft)':'var(--amber-soft)'};border-radius:var(--radius);padding:12px;text-align:center;margin-bottom:14px">
      <div style="font-size:22px;font-weight:700;color:${parseFloat(diff)<0?'var(--green)':'var(--amber)'}">${diff>0?'+':''}${diff} kg</div>
      <div style="font-size:12px;color:var(--text3)">الفرق من البداية</div>
    </div>`:''}
    <div class="weight-entries">${entriesHtml}</div>`;
}
async function saveWeight(idx,val){
  data[`weight_${idx}`]=val;
  renderWeight();
  await saveKey(0,`weight_${idx}`,val);
}

// ============ OVERVIEW TAB ============
function renderOverview(){
  const ti=todayIdx();
  let h='<div class="ov-title">خريطة التقدم — 90 يوم</div><div class="overview-grid">';
  for(let i=0;i<90;i++){
    const{pct}=comp(i);const[bg,tc]=dotColor(pct);
    h+=`<div class="dot${i===ti?' today-dot':''}" style="background:${bg};color:${tc};border-color:${pct>0?tc+'44':'transparent'}" onclick="switchTab('today')" title="يوم ${i+1}: ${pct}%">${i+1}</div>`;
  }
  h+=`</div><div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:rgba(0,0,0,0.06);border:1px solid #ccc"></div>لم يبدأ</div>
    <div class="legend-item"><div class="legend-dot" style="background:rgba(239,68,68,0.18)"></div>1–39%</div>
    <div class="legend-item"><div class="legend-dot" style="background:rgba(245,158,11,0.18)"></div>40–69%</div>
    <div class="legend-item"><div class="legend-dot" style="background:rgba(34,197,94,0.18)"></div>70–99%</div>
    <div class="legend-item"><div class="legend-dot" style="background:rgba(124,106,247,0.25)"></div>مكتمل ✓</div>
  </div>`;
  document.getElementById('pane-overview').innerHTML=h;
}

function updateStats(){
  const ti=todayIdx();
  document.getElementById('s-today').textContent=comp(ti).pct+'%';
  let td=0,tt=0,cd=0,streak=0;
  for(let i=0;i<90;i++){const c=comp(i);td+=c.done;tt+=c.total;if(c.pct===100)cd++;}
  document.getElementById('s-total').textContent=Math.round(td/tt*100)+'%';
  document.getElementById('s-complete').textContent=cd;
  for(let i=Math.min(ti,89);i>=0;i--){if(comp(i).pct===100)streak++;else break;}
  document.getElementById('s-streak').textContent=streak;
}

const TABS=['today','nop','exercise','learn','weight','overview'];
function switchTab(tab){
  activeTab=tab;
  TABS.forEach(t=>{
    document.getElementById('pane-'+t).style.display=t===tab?'':'none';
    const tb=document.getElementById('tab-btn-'+t);if(tb)tb.classList.toggle('active',t===tab);
    const nb=document.getElementById('bnav-'+t);if(nb)nb.classList.toggle('active',t===tab);
  });
  if(tab==='today')renderToday();
  else if(tab==='nop')renderNop();
  else if(tab==='exercise')renderExercise();
  else if(tab==='learn')renderLearn();
  else if(tab==='weight')renderWeight();
  else if(tab==='overview')renderOverview();
}

async function init(){
  START_DATE=new Date();START_DATE.setHours(0,0,0,0);
  const saved=localStorage.getItem('habit90_start');
  if(saved)START_DATE=new Date(saved);else localStorage.setItem('habit90_start',START_DATE.toISOString());
  const end=new Date(START_DATE);end.setDate(end.getDate()+89);
  document.getElementById('date-range').textContent=
    START_DATE.toLocaleDateString('ar-EG',{month:'short',day:'numeric'})+' — '+
    end.toLocaleDateString('ar-EG',{month:'short',day:'numeric',year:'numeric'});
  await loadFromCloud();
  updateStats();
  renderToday();
}
init();
</script>
</body>
</html>
